name: CI

on:
  pull_request:
  workflow_call:

# Categorized test pipelines. Each is a separate, independently-runnable step and
# they execute in sequence; the whole "gate" job must pass before deploy.yml deploys.
# The broad Unit/Feature suites carry pre-existing failures outside these categories,
# so they run in a separate NON-blocking "full-suite-report" job for visibility.

jobs:
  gate:
    name: Test gate (blocks deploy)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, curl, json, bcmath, gd, sqlite3, pdo_sqlite
          coverage: none

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare application
        run: |
          cp .env.example .env
          # Keep the console bootstrap from blocking on Pulse/Telescope during tests.
          {
            echo "PULSE_ENABLED=false"
            echo "TELESCOPE_ENABLED=false"
          } >> .env
          php artisan key:generate

      # --- Pipelines, in sequence. A failure in any step fails the gate. ---

      - name: 1 · Unit pipeline (events)
        run: php artisan test tests/Unit/Events --compact

      - name: 2 · Feature pipeline (events)
        run: php artisan test tests/Feature/Events --compact

      - name: 3 · Smoke pipeline (UI / every endpoint)
        run: php artisan test --testsuite=Smoke --compact

      - name: 4 · API pipeline
        run: php artisan test --testsuite=Api --compact

      - name: 5 · Notifications pipeline
        run: php artisan test --testsuite=Notifications --compact

      - name: 6 · Mail & external communications pipeline
        run: php artisan test --testsuite=Mail --compact

      - name: 7 · Tenant isolation & invariants pipeline
        run: php artisan test --testsuite=Tenancy --compact

      - name: 8 · Load pipeline (events)
        run: php artisan test tests/Load/Events --compact

  full-suite-report:
    name: Full suite (report only, non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Never blocks the merge/deploy — surfaces the broader Unit/Feature status while
    # the pre-existing failures outside the gated categories are worked through.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, curl, json, bcmath, gd, sqlite3, pdo_sqlite
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare application
        run: |
          cp .env.example .env
          {
            echo "PULSE_ENABLED=false"
            echo "TELESCOPE_ENABLED=false"
          } >> .env
          php artisan key:generate

      - name: Unit suite (full)
        run: php artisan test --testsuite=Unit --compact
        continue-on-error: true

      - name: Feature suite (full)
        run: php artisan test --testsuite=Feature --compact
        continue-on-error: true
