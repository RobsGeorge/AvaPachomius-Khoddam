name: Deploy to Production

on:
  push:
    branches:
      - main

# Avoid overlapping deploys (second push while first runs often hits the 10m SSH limit).
concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          timeout: 120s
          command_timeout: 20m
          script: |
            set -e
            cd /var/www/avapakhomios

            PHP_BIN=php8.2
            DEPLOY_USER="$(whoami)"

            if ! $PHP_BIN -m 2>/dev/null | grep -qi pdo_mysql; then
              echo "ERROR: PHP MySQL driver (pdo_mysql) is not installed for $PHP_BIN."
              echo "On Ubuntu/Debian run:"
              echo "  sudo apt update"
              echo "  sudo apt install -y php8.2-mysql php8.2-cli php8.2-fpm php8.2-mbstring php8.2-xml php8.2-curl php8.2-zip php8.2-gd"
              echo "  sudo systemctl restart php8.2-fpm"
              exit 1
            fi

            echo "==> git pull"
            git pull origin main

            echo "==> composer install"
            COMPOSER_ALLOW_SUPERUSER=1 $PHP_BIN /usr/local/bin/composer install \
              --no-interaction \
              --prefer-dist \
              --optimize-autoloader \
              --no-dev \
              --no-progress

            echo "==> migrations"
            $PHP_BIN artisan migrate:deploy --force

            echo "==> optimize"
            $PHP_BIN artisan optimize:clear
            $PHP_BIN artisan optimize

            echo "==> storage link"
            if [ ! -L public/storage ]; then
              $PHP_BIN artisan storage:link
            else
              echo "public/storage link already exists, skipping"
            fi

            echo "==> permissions"
            # GitHub SSH has no TTY — sudo must be passwordless (see .github/DEPLOY-VPS.md).
            chmod -R ug+rwx storage bootstrap/cache 2>/dev/null || true
            if sudo -n true 2>/dev/null; then
              sudo -n chown -R "${DEPLOY_USER}:www-data" storage bootstrap/cache
              sudo -n chmod -R ug+rwx storage bootstrap/cache
            else
              echo "WARN: passwordless sudo not configured — skipped chown (chmod only as ${DEPLOY_USER})"
            fi

            echo "==> reload php-fpm"
            if sudo -n systemctl reload php8.2-fpm 2>/dev/null; then
              echo "php8.2-fpm reloaded"
            else
              echo "WARN: could not reload php-fpm without password — configure NOPASSWD (see .github/DEPLOY-VPS.md)"
            fi

            echo "Deployment complete: $(date)"
