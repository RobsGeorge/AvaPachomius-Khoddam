name: Deploy to Production

on:
  push:
    branches:
      - main

# Avoid overlapping deploys (second push while first runs often hits the 10m SSH limit).
concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          timeout: 120s
          command_timeout: 20m
          script: |
            set -e
            cd /var/www/avapakhomios

            PHP_BIN=php8.2

            if ! $PHP_BIN -m 2>/dev/null | grep -qi pdo_mysql; then
              echo "ERROR: PHP MySQL driver (pdo_mysql) is not installed for $PHP_BIN."
              echo "On Ubuntu/Debian run:"
              echo "  sudo apt update"
              echo "  sudo apt install -y php8.2-mysql php8.2-cli php8.2-fpm php8.2-mbstring php8.2-xml php8.2-curl php8.2-zip php8.2-gd"
              echo "  sudo systemctl restart php8.2-fpm"
              exit 1
            fi

            echo "==> git pull"
            git pull origin main

            echo "==> composer install"
            COMPOSER_ALLOW_SUPERUSER=1 $PHP_BIN /usr/local/bin/composer install \
              --no-interaction \
              --prefer-dist \
              --optimize-autoloader \
              --no-dev \
              --no-progress

            echo "==> migrations"
            $PHP_BIN artisan migrate:deploy --force

            echo "==> optimize"
            $PHP_BIN artisan optimize:clear
            $PHP_BIN artisan optimize
            $PHP_BIN artisan storage:link || true

            echo "==> permissions"
            sudo chown -R $USER:www-data storage bootstrap/cache
            sudo chmod -R ug+rwx storage bootstrap/cache

            echo "==> reload php-fpm"
            sudo systemctl reload php8.2-fpm

            echo "Deployment complete: $(date)"
